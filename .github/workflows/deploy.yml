name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
 test:
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
      node-version: '20'
      cache: 'npm'

    - name: Instalar dependências
      run: npm ci

    - name: Rodar Lint
      run: npm run lint

    - name: Rodar Testes
      run: npm test -- --coverage

    - name: Build da aplicação
      run: npm run build
